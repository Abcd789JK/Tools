services:
  sub-store:
    image: xream/sub-store:latest
    container_name: sub-store
    restart: always
    volumes:
      - /root/Sub-Store:/opt/app/data
    environment:
      - SUB_STORE_BACKEND_SYNC_CRON=55 */4 * * *
      - SUB_STORE_FRONTEND_BACKEND_PATH=/mDZXF2gPTvA
    ports:
      - 0.0.0.0:3001:3001
    stdin_open: true
    tty: true